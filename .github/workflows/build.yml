name: Build MaliOpt

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Verificar ficheiros críticos
        run: |
          echo "=== Gradle Wrapper presente? ==="
          ls -la gradlew gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.properties 2>/dev/null || echo "Erro: Wrapper em falta!"
          echo "=== Access widener (não deve existir) ==="
          find . -name "*.accesswidener" -type f -print || echo "Nenhum access widener encontrado"

      - name: Dar permissão de execução ao gradlew
        run: chmod +x ./gradlew

      - name: Compilar com Gradle Wrapper
        run: ./gradlew clean build --no-daemon

      - name: Upload do artefacto
        uses: actions/upload-artifact@v4
        with:
          name: MaliOpt-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Criar Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
